services:
  _defaults:
    autowire: false
    autoconfigure: false
    public: false

  RemcoSmitsDev\BuildableSerializerBundle\Metadata\ConstructorMetadataExtractor:
    arguments:
      $propertyInfoExtractor: "@property_info"

  RemcoSmitsDev\BuildableSerializerBundle\Metadata\MetadataFactory:
    arguments:
      $propertyInfoExtractor: "@property_info"
      $constructorMetadataExtractor: '@RemcoSmitsDev\BuildableSerializerBundle\Metadata\ConstructorMetadataExtractor'
    tags:
      - { name: buildable_serializer.metadata_factory }

  buildable_serializer.discovery.normalizers:
    class: RemcoSmitsDev\BuildableSerializerBundle\Discovery\FinderClassDiscovery
    arguments:
      $metadataFactory: '@RemcoSmitsDev\BuildableSerializerBundle\Metadata\MetadataFactory'
      $paths: "%buildable_serializer.normalizers.paths%"

  buildable_serializer.discovery.denormalizers:
    class: RemcoSmitsDev\BuildableSerializerBundle\Discovery\FinderClassDiscovery
    arguments:
      $metadataFactory: '@RemcoSmitsDev\BuildableSerializerBundle\Metadata\MetadataFactory'
      $paths: "%buildable_serializer.denormalizers.paths%"

  RemcoSmitsDev\BuildableSerializerBundle\Discovery\ClassDiscoveryInterface:
    alias: "buildable_serializer.discovery.normalizers"
    public: false

  # Normalizer

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerGenerator:
    arguments:
      $metadataFactory: '@RemcoSmitsDev\BuildableSerializerBundle\Metadata\MetadataFactory'
      $generatedNamespace: 'BuildableSerializerBundle\Generated'
      $features: "%buildable_serializer.normalizers.features%"

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerGeneratorInterface:
    alias: 'RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerGenerator'
    public: false

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerPathResolver:
    public: true
    arguments:
      $cacheDir: "%kernel.cache_dir%/buildable_serializer"
      $generatedNamespace: 'BuildableSerializerBundle\Generated'

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerPathResolverInterface:
    alias: 'RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerPathResolver'
    public: false

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerWriter:
    public: true
    arguments:
      $generator: '@RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerGenerator'
      $pathResolver: '@RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerPathResolver'

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerWriterInterface:
    alias: 'RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerWriter'
    public: false

  RemcoSmitsDev\BuildableSerializerBundle\CacheWarmer\NormalizerCacheWarmer:
    arguments:
      $writer: '@RemcoSmitsDev\BuildableSerializerBundle\Generator\Normalizer\NormalizerWriter'
      $discovery: "@buildable_serializer.discovery.normalizers"
    tags:
      - { name: kernel.cache_warmer, priority: 10 }

  # Denormalizer

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerGenerator:
    arguments:
      $metadataFactory: '@RemcoSmitsDev\BuildableSerializerBundle\Metadata\MetadataFactory'
      $generatedNamespace: 'BuildableSerializerBundle\Generated'
      $features: "%buildable_serializer.denormalizers.features%"

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerGeneratorInterface:
    alias: 'RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerGenerator'
    public: false

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerPathResolver:
    public: true
    arguments:
      $cacheDir: "%kernel.cache_dir%/buildable_serializer"
      $generatedNamespace: 'BuildableSerializerBundle\Generated'

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerPathResolverInterface:
    alias: 'RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerPathResolver'
    public: false

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerWriter:
    public: true
    arguments:
      $generator: '@RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerGenerator'
      $pathResolver: '@RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerPathResolver'

  RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerWriterInterface:
    alias: 'RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerWriter'
    public: false

  RemcoSmitsDev\BuildableSerializerBundle\CacheWarmer\DenormalizerCacheWarmer:
    arguments:
      $writer: '@RemcoSmitsDev\BuildableSerializerBundle\Generator\Denormalizer\DenormalizerWriter'
      $discovery: "@buildable_serializer.discovery.denormalizers"
    tags:
      - { name: kernel.cache_warmer, priority: 10 }
